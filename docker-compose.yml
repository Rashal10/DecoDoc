services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: decodoc
      POSTGRES_PASSWORD: decodoc
      POSTGRES_DB: decodoc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decodoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8787
      DATABASE_URL: postgresql://decodoc:decodoc@postgres:5432/decodoc
      CLIENT_ORIGIN: http://localhost:5173
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}

volumes:
  pgdata:
