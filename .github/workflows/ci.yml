name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: |
          npm ci
          ROLLUP_VERSION=$(node -p "require('rollup/package.json').version")
          npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
      - run: npm run lint
      - run: npm test
      - run: npm run build
